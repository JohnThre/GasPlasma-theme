name: Feature request
description: Suggest a theme, release, or documentation improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: request
    attributes:
      label: Request
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Value
      description: Who benefits from this and why?
