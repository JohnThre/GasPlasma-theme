name: Bug report
description: Report a problem with a generated theme or release artifact.
title: "[Bug]: "
labels:
  - bug
body:
  - type: dropdown
    id: target
    attributes:
      label: Target
      options:
        - Apple Terminal
        - iTerm2
        - VS Code/Open VSX
        - GitHub release
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe what happened and what you expected.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Include app version, OS, screenshots, or logs when useful.
