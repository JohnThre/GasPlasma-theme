name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, release, and publish
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          test -n "$GPG_PRIVATE_KEY"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
      - name: Configure GPG
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          chmod +x .github/scripts/gpg-wrapper.sh
          git config gpg.program "$PWD/.github/scripts/gpg-wrapper.sh"
          git config user.signingkey FEA322F2C85C0E17
          git verify-tag "$GITHUB_REF_NAME"
      - name: Install dependencies
        run: npm ci
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(python3 -c 'import json; print(json.load(open("package.json"))["version"])')"
          test "$TAG_VERSION" = "$PACKAGE_VERSION"
      - name: Build and check
        run: |
          npm run build
          npm run check
      - name: Package VSIX
        run: npm run package
      - name: Collect release artifacts
        run: |
          cp GasPlasma.terminal dist/
          cp GasPlasma.itermcolors dist/
          cp assets/logo.png dist/
          cp assets/mockup.png dist/
          (cd dist && shasum -a 256 * > SHA256SUMS)
      - name: Sign checksums
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --armor --detach-sign dist/SHA256SUMS
          gpg --verify dist/SHA256SUMS.asc dist/SHA256SUMS
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/GasPlasma.terminal
            dist/GasPlasma.itermcolors
            dist/johnthre.gas-plasma-theme-*.vsix
            dist/logo.png
            dist/mockup.png
            dist/SHA256SUMS
            dist/SHA256SUMS.asc
      - name: Ensure Open VSX namespace
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          test -n "$OVSX_PAT"
          if ! curl -fsS https://open-vsx.org/api/johnthre/details >/dev/null; then
            npx ovsx create-namespace johnthre -p "$OVSX_PAT"
          fi
      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: npx ovsx publish dist/johnthre.gas-plasma-theme-*.vsix -p "$OVSX_PAT"
