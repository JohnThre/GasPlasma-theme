name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and verify
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build generated artifacts
        run: npm run build
      - name: Run checks
        run: npm run check
      - name: Package VSIX
        run: npm run package
      - name: Verify generated files are current
        run: git diff --exit-code
