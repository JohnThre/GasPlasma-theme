name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and verify
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build generated artifacts
        run: npm run build
      - name: Run checks
        run: npm run check
      - name: Package VSIX
        run: npm run package
      - name: Verify generated text files are current
        run: |
          git diff --exit-code -- \
            GasPlasma.itermcolors \
            themes/gas-plasma-color-theme.json \
            assets/logo.svg \
            assets/logo.png \
            assets/architecture.svg \
            assets/architecture.png \
            assets/mockup.svg \
            assets/mockup.png \
            docs/assets/logo.svg \
            docs/assets/logo.png \
            docs/assets/architecture.svg \
            docs/assets/architecture.png \
            docs/assets/mockup.svg \
            docs/assets/mockup.png \
            docs/index.html
