  <text x="1008" y="332" font-family="SF Mono, Menlo, Consolas, monospace" font-size="25"><tspan fill="#8F4A00"> 3</tspan><tspan dx="42"><tspan fill="#E8C547">  background</tspan><tspan fill="#FFF0DB">: </tspan><tspan fill="#B5CC18">'#1A0A00'</tspan><tspan fill="#FFF0DB">,</tspan></tspan></text>
  <text x="1008" y="370" font-family="SF Mono, Menlo, Consolas, monospace" font-size="25"><tspan fill="#8F4A00"> 4</tspan><tspan dx="42"><tspan fill="#E8C547">  foreground</tspan><tspan fill="#FFF0DB">: </tspan><tspan fill="#B5CC18">'#FF8C00'</tspan><tspan fill="#FFF0DB">,</tspan></tspan></text>
  <text x="1008" y="408" font-family="SF Mono, Menlo, Consolas, monospace" font-size="25"><tspan fill="#8F4A00"> 5</tspan><tspan dx="42"><tspan fill="#E8C547">  accents</tspan><tspan fill="#FFF0DB">: [</tspan><tspan fill="#B5CC18">'plasma'</tspan><tspan fill="#FFF0DB">, </tspan><tspan fill="#B5CC18">'ember'</tspan><tspan fill="#FFF0DB">]</tspan></tspan></text>
  <text x="1008" y="446" font-family="SF Mono, Menlo, Consolas, monospace" font-size="25"><tspan fill="#8F4A00"> 6</tspan><tspan dx="42"><tspan fill="#FFF0DB">};</tspan></tspan></text>
  <text x="1008" y="532" font-family="SF Mono, Menlo, Consolas, monospace" font-size="25"><tspan fill="#8F4A00"> 7</tspan><tspan dx="42"><tspan fill="#FF6B3D">export </tspan><tspan fill="#FF6B3D">default </tspan><tspan fill="#FFD2A6">theme</tspan><tspan fill="#FFF0DB">;</tspan></tspan></text>
