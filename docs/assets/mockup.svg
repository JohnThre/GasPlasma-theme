  <text x="92" y="154" fill="#E8C547" font-family="SF Mono, Menlo, Consolas, monospace" font-size="24">Apple Terminal  |  iTerm2  |  VS Code  |  Zed</text>
  <rect x="94" y="180" width="418" height="8" rx="4" fill="url(#accent)"/>

